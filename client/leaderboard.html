<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - THINK++</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th {
            background-color: #FF4800;
            color: white;
            padding: 10px;
            text-align: center;
        }
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:first-child td { font-weight: bold; color: #FF4800; }
        .rank { font-weight: bold; }
        .empty { color: #aaa; font-size: 13px; padding: 20px; }
        .medal { font-size: 18px; }
    </style>
</head>
<body>
    <div class="card" style="gap: 16px;">
        <h1>🏆 Leaderboard</h1>
        <p>Top 10 scores from quiz battles</p>

        <table id="leaderboardTable">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                    <th>Difficulty</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="4" class="empty">Loading...</td></tr>
            </tbody>
        </table>

        <div class="but">
            <button onclick="location.href='index.html'">Back to Menu</button>
        </div>
    </div>

    <script>
        const medals = ['🥇', '🥈', '🥉'];

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/auth/leaderboard');
                const scores = await res.json();
                const tbody = document.getElementById('leaderboardBody');

                if (!scores.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty">No scores yet. Be the first!</td></tr>';
                    return;
                }

                tbody.innerHTML = scores.map((s, i) => `
                    <tr>
                        <td class="rank">${medals[i] || (i + 1)}</td>
                        <td>${s.username}</td>
                        <td>${s.score}/${s.total}</td>
                        <td style="text-transform: capitalize;">${s.difficulty}</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('leaderboardBody').innerHTML =
                    '<tr><td colspan="4" class="empty">Failed to load leaderboard.</td></tr>';
            }
        }

        loadLeaderboard();
    </script>
</body>
</html>
