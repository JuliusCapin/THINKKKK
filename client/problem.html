<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Problem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        background: linear-gradient(to bottom, #E374F9, #F8D8F8);
        background-repeat: no-repeat;
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .title{
        text-align: center;
        margin-top: 20px;
        font-weight: bold;
    }

    .card{
        background-color: #e9e9e9;
        position: absolute;
        width: 90%;
        max-width: 600px;
        padding: 60px 40px;
        border-radius: 15px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 70%;
    }

    .but{
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap:20px;
        margin-top: 20px;
    }

    .but button{
        background-color: white;
        padding: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
    }

    .but button:hover{
        background-color: #ddd;
    }

    .result{
        margin-top: 15px;
        font-weight: bold;
    }

    .next-btn{
        align-items: center;
        margin-top: 15px;
        padding: 10px;
        border: none;
        width: 100%;
        border-radius: 8px;
        background-color: #FF4800;
        color: white;
        cursor: pointer;
        visibility: hidden;
    }

    .finalResult {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 15px;
        font-size: 24px;
        font-weight: bold;
    }

    .finalResult button {
        padding: 15px 25px;
        background-color: #FF4800;
        border: none;
        border-radius: 15px;
        color: white;
        cursor: pointer;
        font-size: 16px;
    }
</style>
</head>

<body>

<p class="title" id="problemNumber">Problem 1</p>

<div class="card">
    <div class="quizContent">
        <div>
            <p id="questionText"></p>
        </div>

        <div class="but">
            <button onclick="checkAnswer(0)" id="btn0"></button>
            <button onclick="checkAnswer(1)" id="btn1"></button>
            <button onclick="checkAnswer(2)" id="btn2"></button>
            <button onclick="checkAnswer(3)" id="btn3"></button>
        </div>

        <p class="result" id="result"></p>
        <button class="next-btn" id="bbtn" onclick="nextQuestion()">Next</button>
    </div>
    <div class="finalResult" style="display: none;"></div>
</div>

<script>
    const difficulty = localStorage.getItem("difficulty") || "easy";

    const selectedQuiz = [];
    let currentQuestion = 0;
    let score = 0;

    const questionText = document.getElementById("questionText");
    const problemNumber = document.getElementById("problemNumber");
    const result = document.getElementById("result");
    const buttons = document.querySelectorAll(".but button");

    const uploadedQuiz = localStorage.getItem("uploadedQuiz");

    if (difficulty === "uploaded" && uploadedQuiz) {
        const parsed = JSON.parse(uploadedQuiz);
        parsed.forEach(q => {
            // Strip "A) " prefix from options if present
            const cleanOptions = q.options.map(o => o.replace(/^[A-D]\)\s*/, ''));
            // Get correct index from answer letter
            const correctIndex = ['A','B','C','D'].indexOf(q.answer);
            selectedQuiz.push({
                question: q.question,
                options: cleanOptions,
                correct: correctIndex !== -1 ? correctIndex : 0
            });
        });
        loadQuestion();
    } else {
        fetch("quiz.json")
            .then(response => response.json())
            .then(data => {
                selectedQuiz.push(...data[difficulty]);
                loadQuestion();
            })
            .catch(error => console.error("Error loading quiz data:", error));
    }

    function loadQuestion() {
        const current = selectedQuiz[currentQuestion];

        if (!current) {
            console.error("No question found at index", currentQuestion);
            return;
        }

        problemNumber.textContent = "Problem " + (currentQuestion + 1);
        questionText.textContent = current.question;

        for (let i = 0; i < 4; i++) {
            buttons[i].textContent = String.fromCharCode(65 + i) + ". " + (current.options[i] || "");
            buttons[i].disabled = false;
            buttons[i].style.backgroundColor = "white";
        }

        result.textContent = "";
        document.getElementById("bbtn").style.visibility = "hidden";
    }

    function checkAnswer(selected) {
        const correctIndex = selectedQuiz[currentQuestion].correct;

        if (selected === correctIndex) {
            result.textContent = "Correct!";
            result.style.color = "green";
            buttons[selected].style.backgroundColor = "#4CAF50";
            score++;
        } else {
            result.textContent = "Wrong!";
            result.style.color = "red";
            buttons[selected].style.backgroundColor = "#f44336";
            buttons[correctIndex].style.backgroundColor = "#4CAF50";
        }

        document.getElementById("bbtn").style.visibility = "visible";
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < selectedQuiz.length) {
            loadQuestion();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.querySelector(".quizContent").style.display = "none";
        const finalDiv = document.querySelector(".finalResult");
        finalDiv.style.display = "flex";
        finalDiv.innerHTML = `
            <p>Your final score is: ${score}/${selectedQuiz.length}</p>
            <div style="display:flex; gap:10px;">
                <button onclick="restartQuiz()">Restart Quiz</button>
                <button onclick="location.href='index.html'">Main Menu</button>
            </div>
        `;
    }

    function restartQuiz() {
        localStorage.removeItem("uploadedQuiz");
        localStorage.removeItem("difficulty");
        window.location.href = "difficulty.html";
    }
</script>

</body>
</html>
