<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Problem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, #E374F9, #F8D8F8);
        min-height: 100vh;
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .title {
        text-align: center;
        margin-bottom: 16px;
        font-weight: bold;
        font-size: 18px;
    }

    .card {
        background-color: #e9e9e9;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 30px 20px;
        border-radius: 15px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .difficulty-badge {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.3s;
    }
    .badge-easy { background: #4CAF50; color: white; }
    .badge-medium { background: #FF9800; color: white; }
    .badge-hard { background: #f44336; color: white; }

    .difficulty-change {
        font-size: 13px;
        font-weight: bold;
        padding: 8px 12px;
        border-radius: 8px;
        animation: popIn 0.4s ease;
        display: none;
    }
    .up { background: #fff3cd; color: #856404; }
    .down { background: #d1ecf1; color: #0c5460; }

    @keyframes popIn {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    #questionLabel {
        font-size: 16px;
        line-height: 1.5;
        display: none;
    }

    #questionCode {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        padding: 14px 16px;
        border-radius: 10px;
        text-align: left;
        white-space: pre;
        display: none;
        overflow-x: auto;
    }

    #questionText {
        font-size: 16px;
        line-height: 1.5;
        display: none;
    }

    .but {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .but button {
        background-color: white;
        padding: 16px 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 13px;
        line-height: 1.4;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-word;
    }

    .but button:hover { background-color: #ddd; }
    .result { font-weight: bold; font-size: 16px; }

    .next-btn {
        padding: 14px;
        border: none;
        width: 100%;
        border-radius: 8px;
        background-color: #FF4800;
        color: white;
        cursor: pointer;
        font-size: 16px;
        visibility: hidden;
    }

    .progress-bar-wrap {
        background: #ddd;
        border-radius: 10px;
        height: 8px;
        width: 70%;
    }

    .progress-bar {
        height: 8px;
        border-radius: 10px;
        background: #FF4800;
        transition: width 0.4s ease;
    }

    .finalResult {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        font-size: 20px;
        font-weight: bold;
    }

    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .finalResult button {
        padding: 14px 24px;
        background-color: #FF4800;
        border: none;
        border-radius: 15px;
        color: white;
        cursor: pointer;
        font-size: 15px;
    }

    .summary {
        font-size: 13px;
        color: #555;
        font-weight: normal;
        line-height: 1.8;
    }
</style>
</head>
<body>

<p class="title" id="problemNumber">Problem 1 of 10</p>

<div class="card">
    <div class="quizContent">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="difficulty-badge badge-easy" id="diffBadge">Easy</span>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progressBar" style="width:0%"></div>
            </div>
        </div>

        <div class="difficulty-change" id="diffChange"></div>

        <div>
            <p id="questionLabel"></p>
            <pre id="questionCode"></pre>
            <p id="questionText"></p>
        </div>

        <div class="but">
            <button onclick="checkAnswer(0)" id="btn0"></button>
            <button onclick="checkAnswer(1)" id="btn1"></button>
            <button onclick="checkAnswer(2)" id="btn2"></button>
            <button onclick="checkAnswer(3)" id="btn3"></button>
        </div>

        <p class="result" id="result"></p>
        <button class="next-btn" id="bbtn" onclick="nextQuestion()">Next →</button>
    </div>
    <div class="finalResult" style="display:none;"></div>
</div>

<script>
    const MAX_QUESTIONS = 10;
    const LEVELS = ['easy', 'medium', 'hard'];

    const startDifficulty = localStorage.getItem("difficulty") || "easy";
    const uploadedQuiz = localStorage.getItem("uploadedQuiz");

    let allQuestions = {};
    let usedIndexes = { easy: new Set(), medium: new Set(), hard: new Set() };
    let currentDifficulty = startDifficulty;

    let questionHistory = [];
    let currentQuestion = null;
    let questionCount = 0;
    let score = 0;
    let streak = 0;

    const questionLabel = document.getElementById("questionLabel");
    const questionCode  = document.getElementById("questionCode");
    const questionText  = document.getElementById("questionText");
    const problemNumber = document.getElementById("problemNumber");
    const result        = document.getElementById("result");
    const buttons       = document.querySelectorAll(".but button");
    const diffBadge     = document.getElementById("diffBadge");
    const diffChange    = document.getElementById("diffChange");
    const progressBar   = document.getElementById("progressBar");

    function updateBadge(diff) {
        diffBadge.textContent = diff.charAt(0).toUpperCase() + diff.slice(1);
        diffBadge.className = 'difficulty-badge badge-' + diff;
    }

    function showDifficultyChange(msg, type) {
        diffChange.textContent = msg;
        diffChange.className = 'difficulty-change ' + type;
        diffChange.style.display = 'block';
        setTimeout(() => { diffChange.style.display = 'none'; }, 2500);
    }

    function getNextQuestion() {
        const pool = allQuestions[currentDifficulty];
        if (!pool || pool.length === 0) return null;

        const unused = pool.map((q, i) => i).filter(i => !usedIndexes[currentDifficulty].has(i));

        if (unused.length === 0) {
            usedIndexes[currentDifficulty].clear();
            return getNextQuestion();
        }

        const idx = unused[Math.floor(Math.random() * unused.length)];
        usedIndexes[currentDifficulty].add(idx);
        return { ...pool[idx], difficulty: currentDifficulty };
    }

    function adjustDifficulty(wasCorrect) {
        streak = wasCorrect ? (streak > 0 ? streak + 1 : 1) : (streak < 0 ? streak - 1 : -1);

        const currentLevel = LEVELS.indexOf(currentDifficulty);

        if (streak >= 3 && currentLevel < 2) {
            currentDifficulty = LEVELS[currentLevel + 1];
            streak = 0;
            updateBadge(currentDifficulty);
            showDifficultyChange('Nice streak! Moving to ' + currentDifficulty, 'up');
        } else if (streak <= -2 && currentLevel > 0) {
            currentDifficulty = LEVELS[currentLevel - 1];
            streak = 0;
            updateBadge(currentDifficulty);
            showDifficultyChange('Adjusting to ' + currentDifficulty, 'down');
        }
    }

    function renderQuestion(q) {
        questionLabel.style.display = 'none';
        questionCode.style.display  = 'none';
        questionText.style.display  = 'none';

        const raw = q.question;

        if (raw.includes('\n')) {
            const parts = raw.split('\n');
            const codeLines = [], labelLines = [];
            parts.forEach(line => {
                const t = line.trim();
                if (/[{};=<>!+\-*/%]/.test(t) || /^\s*(int|float|double|char|string|cout|cin|for|while|if)\b/.test(t)) {
                    codeLines.push(t);
                } else if (t.length > 0) {
                    labelLines.push(t);
                }
            });
            if (codeLines.length) { questionCode.textContent = codeLines.join('\n'); questionCode.style.display = 'block'; }
            if (labelLines.length) { questionLabel.textContent = labelLines.join(' '); questionLabel.style.display = 'block'; }
        } else {
            questionText.textContent = raw;
            questionText.style.display = 'block';
        }
    }

    function loadQuestion() {
        currentQuestion = getNextQuestion();
        if (!currentQuestion) return;

        questionCount++;
        problemNumber.textContent = 'Problem ' + questionCount + ' of ' + MAX_QUESTIONS;
        progressBar.style.width = ((questionCount - 1) / MAX_QUESTIONS * 100) + '%';
        updateBadge(currentDifficulty);
        renderQuestion(currentQuestion);

        for (let i = 0; i < 4; i++) {
            buttons[i].textContent = String.fromCharCode(65 + i) + '. ' + (currentQuestion.options[i] || '');
            buttons[i].disabled = false;
            buttons[i].style.backgroundColor = 'white';
        }

        result.textContent = '';
        document.getElementById('bbtn').style.visibility = 'hidden';
    }

    function checkAnswer(selected) {
        const correctIndex = currentQuestion.correct;
        const wasCorrect = selected === correctIndex;

        if (wasCorrect) {
            result.textContent = 'Correct!';
            result.style.color = 'green';
            buttons[selected].style.backgroundColor = '#4CAF50';
            score++;
        } else {
            result.textContent = 'Wrong!';
            result.style.color = 'red';
            buttons[selected].style.backgroundColor = '#f44336';
            buttons[correctIndex].style.backgroundColor = '#4CAF50';
        }

        questionHistory.push({ correct: wasCorrect, difficulty: currentQuestion.difficulty });
        adjustDifficulty(wasCorrect);
        document.getElementById('bbtn').style.visibility = 'visible';
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        if (questionCount >= MAX_QUESTIONS) {
            showFinalResult();
        } else {
            loadQuestion();
        }
    }

    async function saveScore() {
        if (startDifficulty === 'uploaded') return;
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            await fetch('/api/auth/score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ score, total: MAX_QUESTIONS, difficulty: startDifficulty })
            });
        } catch (err) {
            console.error('Failed to save score:', err);
        }
    }

    function showFinalResult() {
        saveScore();
        progressBar.style.width = '100%';

        const breakdown = { easy: {c:0,t:0}, medium: {c:0,t:0}, hard: {c:0,t:0} };
        questionHistory.forEach(h => {
            breakdown[h.difficulty].t++;
            if (h.correct) breakdown[h.difficulty].c++;
        });

        const breakdownHTML = Object.entries(breakdown)
            .filter(([,v]) => v.t > 0)
            .map(([k,v]) => k.charAt(0).toUpperCase() + k.slice(1) + ': ' + v.c + '/' + v.t)
            .join(' | ');

        document.querySelector('.quizContent').style.display = 'none';
        const finalDiv = document.querySelector('.finalResult');
        finalDiv.style.display = 'flex';
        finalDiv.innerHTML =
            '<p>Your final score is:<br>' + score + '/' + MAX_QUESTIONS + '</p>' +
            '<p class="summary">' + breakdownHTML + '</p>' +
            '<div class="btn-row">' +
                '<button onclick="restartQuiz()">Play Again</button>' +
                '<button onclick="location.href=\'leaderboard.html\'">🏆 Leaderboard</button>' +
                '<button onclick="location.href=\'index.html\'">Main Menu</button>' +
            '</div>';
    }

    function restartQuiz() {
        localStorage.removeItem('uploadedQuiz');
        localStorage.removeItem('difficulty');
        window.location.href = 'difficulty.html';
    }

    // Init
    if (startDifficulty === 'uploaded' && uploadedQuiz) {
        const parsed = JSON.parse(uploadedQuiz);
        const mapped = parsed.map(q => ({
            question: q.question,
            options: q.options.map(o => o.replace(/^[A-D]\)\s*/, '')),
            correct: ['A','B','C','D'].indexOf(q.answer) !== -1 ? ['A','B','C','D'].indexOf(q.answer) : 0
        }));
        allQuestions = { easy: mapped, medium: mapped, hard: mapped };
        currentDifficulty = 'easy';
        loadQuestion();
    } else {
        fetch('quiz.json')
            .then(r => r.json())
            .then(data => {
                allQuestions = data;
                loadQuestion();
            })
            .catch(e => console.error(e));
    }
</script>
</body>
</html>
