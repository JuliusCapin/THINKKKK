<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Problem</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, #E374F9, #F8D8F8);
        min-height: 100vh;
        font-family: Arial, sans-serif;
        padding: 24px 16px;
    }

    .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 600px;
        margin: 0 auto 16px;
    }

    .problem-title {
        font-weight: bold;
        font-size: 16px;
    }

    .diff-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .badge-easy   { background: #4CAF50; color: white; }
    .badge-medium { background: #FF9800; color: white; }
    .badge-hard   { background: #f44336; color: white; }

    .progress-wrap {
        max-width: 600px;
        margin: 0 auto 16px;
        background: rgba(255,255,255,0.35);
        border-radius: 100px;
        height: 6px;
    }
    .progress-bar {
        height: 6px;
        border-radius: 100px;
        background: #FF4800;
        transition: width 0.4s ease;
    }

    .diff-toast {
        display: none;
        font-size: 13px;
        font-weight: bold;
        padding: 8px 14px;
        border-radius: 10px;
        margin-bottom: 4px;
        animation: popIn 0.3s ease;
    }
    .toast-up   { background: #fff9c4; color: #7a5c00; }
    .toast-down { background: #d9f0ff; color: #005f8e; }

    @keyframes popIn {
        from { transform: scale(0.9); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
    }

    .card {
        background-color: #e9e9e9;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 24px 20px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* Question text label (e.g. "What is the value of...?") */
    #questionLabel {
        font-size: 15px;
        line-height: 1.55;
        color: #111;
        display: none;
    }

    /* Plain question (no code) */
    #questionText {
        font-size: 15px;
        line-height: 1.55;
        color: #111;
        display: none;
    }

    /* Dark code block */
    #questionCode {
        display: none;
        background: #0f1117;
        border-radius: 10px;
        padding: 14px 16px;
        overflow-x: auto;
    }

    #questionCode code {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13.5px;
        color: #e2e8f0;
        white-space: pre;
        line-height: 1.65;
        display: block;
    }

    /* Answer buttons grid */
    .but {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }

    .but button {
        background-color: white;
        padding: 14px 10px;
        border: 2px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 13px;
        line-height: 1.4;
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-word;
        text-align: center;
        font-family: Arial, sans-serif;
    }

    .but button:hover:not(:disabled) { background-color: #f0f0f0; }

    .result {
        font-weight: bold;
        font-size: 15px;
        min-height: 22px;
    }

    .next-btn {
        padding: 13px;
        border: none;
        width: 100%;
        border-radius: 10px;
        background-color: #FF4800;
        color: white;
        cursor: pointer;
        font-size: 15px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        visibility: hidden;
        transition: 0.2s;
    }
    .next-btn:hover { opacity: 0.88; }

    /* Final screen */
    .finalResult {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
        padding: 10px 0;
    }

    .final-score {
        font-size: 36px;
        font-weight: bold;
        color: #111;
    }

    .final-sub {
        font-size: 13px;
        color: #666;
        font-weight: normal;
        margin-top: -6px;
    }

    .breakdown {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .breakdown span {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }
    .pill-easy   { background: #dcfce7; color: #166534; }
    .pill-medium { background: #fef9c3; color: #92400e; }
    .pill-hard   { background: #fee2e2; color: #991b1b; }

    .btn-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .btn-row button {
        padding: 12px 20px;
        background-color: #FF4800;
        border: none;
        border-radius: 12px;
        color: white;
        cursor: pointer;
        font-size: 14px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        transition: 0.2s;
    }
    .btn-row button:hover { opacity: 0.88; }
    .btn-row .btn-sec {
        background: #ddd;
        color: #333;
    }
</style>
</head>
<body>

<div class="top-bar">
    <span class="problem-title" id="problemNumber">Problem 1 of 10</span>
    <span class="diff-badge badge-easy" id="diffBadge">Easy</span>
</div>

<div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<div class="card">
    <div class="diff-toast" id="diffToast"></div>

    <div class="quizContent">
        <!-- Question label (text part) -->
        <p id="questionLabel"></p>

        <!-- Code block -->
        <div id="questionCode"><code id="codeContent"></code></div>

        <!-- Plain question (no code) -->
        <p id="questionText"></p>

        <div class="but" style="margin-top: 12px;">
            <button onclick="checkAnswer(0)" id="btn0"></button>
            <button onclick="checkAnswer(1)" id="btn1"></button>
            <button onclick="checkAnswer(2)" id="btn2"></button>
            <button onclick="checkAnswer(3)" id="btn3"></button>
        </div>

        <p class="result" id="result"></p>
        <button class="next-btn" id="bbtn" onclick="nextQuestion()">Next →</button>
    </div>

    <div class="finalResult" id="finalCard"></div>
</div>

<script>
    const LEVELS = ['easy', 'medium', 'hard'];
    const startDifficulty = localStorage.getItem("difficulty") || "easy";
    const uploadedQuiz = localStorage.getItem("uploadedQuiz");
    const isUploaded = startDifficulty === 'uploaded' && uploadedQuiz;

    let allQuestions = {};
    let usedIndexes = { easy: new Set(), medium: new Set(), hard: new Set() };
    let currentDifficulty = isUploaded ? 'easy' : startDifficulty;

    let uploadedList = [];
    let uploadedIndex = 0;
    let MAX_QUESTIONS = 10;

    let questionHistory = [];
    let currentQuestion = null;
    let questionCount = 0;
    let score = 0;
    let streak = 0;

    const questionLabel = document.getElementById("questionLabel");
    const questionCode  = document.getElementById("questionCode");
    const codeContent   = document.getElementById("codeContent");
    const questionText  = document.getElementById("questionText");
    const problemNumber = document.getElementById("problemNumber");
    const resultEl      = document.getElementById("result");
    const buttons       = document.querySelectorAll(".but button");
    const diffBadge     = document.getElementById("diffBadge");
    const diffToast     = document.getElementById("diffToast");
    const progressBar   = document.getElementById("progressBar");
    const finalCard     = document.getElementById("finalCard");

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function updateBadge(diff) {
        diffBadge.textContent = diff.charAt(0).toUpperCase() + diff.slice(1);
        diffBadge.className = 'diff-badge badge-' + diff;
    }

    function showToast(msg, type) {
        diffToast.textContent = msg;
        diffToast.className = 'diff-toast ' + type;
        diffToast.style.display = 'block';
        setTimeout(() => { diffToast.style.display = 'none'; }, 2500);
    }

    function getNextQuestion() {
        if (isUploaded) {
            if (uploadedIndex >= uploadedList.length) return null;
            return { ...uploadedList[uploadedIndex++], difficulty: 'uploaded' };
        }
        const pool = allQuestions[currentDifficulty];
        if (!pool || !pool.length) return null;
        let unused = pool.map((q, i) => i).filter(i => !usedIndexes[currentDifficulty].has(i));
        if (!unused.length) { usedIndexes[currentDifficulty].clear(); return getNextQuestion(); }
        const idx = unused[Math.floor(Math.random() * unused.length)];
        usedIndexes[currentDifficulty].add(idx);
        return { ...pool[idx], difficulty: currentDifficulty };
    }

    function adjustDifficulty(wasCorrect) {
        if (isUploaded) return;
        streak = wasCorrect ? (streak > 0 ? streak + 1 : 1) : (streak < 0 ? streak - 1 : -1);
        const lvl = LEVELS.indexOf(currentDifficulty);
        if (streak >= 3 && lvl < 2) {
            currentDifficulty = LEVELS[lvl + 1]; streak = 0;
            updateBadge(currentDifficulty);
            showToast('Nice streak! Moving to ' + currentDifficulty, 'toast-up');
        } else if (streak <= -2 && lvl > 0) {
            currentDifficulty = LEVELS[lvl - 1]; streak = 0;
            updateBadge(currentDifficulty);
            showToast('Adjusting to ' + currentDifficulty, 'toast-down');
        }
    }

    // Detect if a line looks like code
    function isCodeLine(line) {
        const t = line.trim();
        // Plain English sentences are NOT code
        if (/^(What|Which|How|Why|When|Who|Is|Are|Does|Do|The|A |An )/i.test(t)) return false;
        // Must have clear C++ indicators
        const hasKeyword = /\b(int|float|double|char|string|bool|void|cout|cin|return|for|while|class|struct|include|using|namespace|endl|auto|const)\b/.test(t);
        const hasOperator = /<<|>>|\+\+|--|[{}]|;\s|;$/.test(t);
        return hasKeyword || hasOperator;
    }

    function renderQuestion(q) {
        questionLabel.style.display = 'none';
        questionCode.style.display  = 'none';
        questionText.style.display  = 'none';
        codeContent.textContent = '';
        questionLabel.textContent = '';
        questionText.textContent = '';

        const raw = q.question;

        if (raw.includes('\n')) {
            const parts = raw.split('\n');
            const codeLines = [], labelLines = [];
            parts.forEach(line => {
                const t = line.trim();
                if (!t) return;
                if (isCodeLine(t)) codeLines.push(t);
                else labelLines.push(t);
            });
            if (codeLines.length) {
                // Put each semicolon-separated statement on its own line
                const formatted = codeLines.map(line => {
                    return line.split(/; +/).filter(s => s.trim()).join(';\n');
                }).join('\n');
                codeContent.textContent = formatted;
                questionCode.style.display = 'block';
            }
            if (labelLines.length) {
                questionLabel.textContent = labelLines.join(' ');
                questionLabel.style.display = 'block';
            }
        } else {
            // Single line — check if it contains inline code patterns
            if (isCodeLine(raw)) {
                codeContent.textContent = raw;
                questionCode.style.display = 'block';
            } else {
                questionText.textContent = raw;
                questionText.style.display = 'block';
            }
        }
    }

    function loadQuestion() {
        currentQuestion = getNextQuestion();
        if (!currentQuestion) { showFinalResult(); return; }

        questionCount++;
        problemNumber.textContent = 'Problem ' + questionCount + ' of ' + MAX_QUESTIONS;
        progressBar.style.width = ((questionCount - 1) / MAX_QUESTIONS * 100) + '%';
        if (!isUploaded) updateBadge(currentDifficulty);

        renderQuestion(currentQuestion);

        for (let i = 0; i < 4; i++) {
            buttons[i].textContent = String.fromCharCode(65 + i) + '. ' + (currentQuestion.options[i] || '');
            buttons[i].disabled = false;
            buttons[i].style.backgroundColor = 'white';
            buttons[i].style.borderColor = 'transparent';
            buttons[i].style.color = '#111';
        }

        resultEl.textContent = '';
        resultEl.style.color = '';
        document.getElementById('bbtn').style.visibility = 'hidden';
    }

    function checkAnswer(selected) {
        const correctIndex = currentQuestion.correct;
        const wasCorrect = selected === correctIndex;

        if (wasCorrect) {
            resultEl.textContent = '';
            buttons[selected].style.backgroundColor = '#4CAF50';
            buttons[selected].style.color = 'white';
            score++;
        } else {
            resultEl.textContent = '';
            buttons[selected].style.backgroundColor = '#f44336';
            buttons[selected].style.color = 'white';
            buttons[correctIndex].style.backgroundColor = '#4CAF50';
            buttons[correctIndex].style.color = 'white';
        }

        questionHistory.push({ correct: wasCorrect, difficulty: currentQuestion.difficulty });
        adjustDifficulty(wasCorrect);
        document.getElementById('bbtn').style.visibility = 'visible';
        buttons.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        if (questionCount >= MAX_QUESTIONS) showFinalResult();
        else loadQuestion();
    }

    async function saveScore() {
        if (isUploaded) return;
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            await fetch('/api/auth/score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ score, total: MAX_QUESTIONS, difficulty: startDifficulty })
            });
        } catch (e) { console.error(e); }
    }

    function showFinalResult() {
        saveScore();
        progressBar.style.width = '100%';

        const breakdown = { easy:{c:0,t:0}, medium:{c:0,t:0}, hard:{c:0,t:0} };
        questionHistory.forEach(h => {
            if (!breakdown[h.difficulty]) return;
            breakdown[h.difficulty].t++;
            if (h.correct) breakdown[h.difficulty].c++;
        });

        const pillsHTML = Object.entries(breakdown)
            .filter(([, v]) => v.t > 0)
            .map(([k, v]) => `<span class="pill-${k}">${k.charAt(0).toUpperCase()+k.slice(1)}: ${v.c}/${v.t}</span>`)
            .join('');

        document.querySelector('.quizContent').style.display = 'none';

        finalCard.style.display = 'flex';
        finalCard.innerHTML = `
            <div class="final-score">${score}/${MAX_QUESTIONS}</div>
            <div class="final-sub">Your Final Score</div>
            ${pillsHTML ? `<div class="breakdown">${pillsHTML}</div>` : ''}
            <div class="btn-row">
                <button onclick="restartQuiz()">Play Again</button>
                ${!isUploaded ? `<button onclick="location.href='leaderboard.html'">Leaderboard</button>` : ''}
                <button class="btn-sec" onclick="location.href='index.html'">Main Menu</button>
            </div>
        `;
    }

    function restartQuiz() {
        localStorage.removeItem('uploadedQuiz');
        localStorage.removeItem('difficulty');
        window.location.href = isUploaded ? 'upload.html' : 'difficulty.html';
    }

    // Init
    if (isUploaded) {
        const parsed = JSON.parse(uploadedQuiz);
        const mapped = parsed.map(q => ({
            question: q.question,
            options: q.options.map(o => o.replace(/^[A-D]\)\s*/, '')),
            correct: ['A','B','C','D'].indexOf(q.answer) !== -1 ? ['A','B','C','D'].indexOf(q.answer) : 0
        }));
        uploadedList = shuffle(mapped).slice(0, 20);
        MAX_QUESTIONS = uploadedList.length;
        diffBadge.style.display = 'none';
        loadQuestion();
    } else {
        fetch('quiz.json')
            .then(r => r.json())
            .then(data => { allQuestions = data; loadQuestion(); })
            .catch(e => console.error(e));
    }
</script>
</body>
</html>
